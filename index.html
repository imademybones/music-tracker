<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Found Frequency</title>
<link rel="icon" type="image/png" sizes="32x32" href="icon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icon-16.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d0d0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Found Frequency">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h1>Found Frequency</h1>
  <span>Release Log</span>
  <div class="header-stats" id="headerStats"></div>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('log')">Log</button>
  <button class="tab-btn" onclick="showTab('stats')">Stats</button>
</div>

<div id="offlineBannerSlot"></div>

<div class="main">

  <!-- LOG TAB -->
  <div id="tabLog">

    <div id="fridaySlot"></div>
    <div id="heroSlot"></div>

    <div class="add-form collapsed" id="addFormDisclosure">
      <div class="disclosure-head" tabindex="0" role="button" aria-expanded="false" aria-controls="addFormDisclosure" onclick="toggleAddForm()" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleAddForm();}">
        <div class="form-title" id="formLabel" style="margin-bottom:0;">+ Add Release</div>
        <span class="disclosure-chevron">▾</span>
      </div>

      <div class="add-form-body">
      <div class="spotify-search-row">
        <input type="text" id="spotifySearchInput" placeholder="Search Spotify to autofill (artist, album)…" onkeydown="if(event.key==='Enter'){event.preventDefault(); spotifySearch();}">
        <button class="btn-ghost" onclick="spotifySearch()">Search</button>
      </div>
      <div id="spotifyResults"></div>

      <div class="form-row two">
        <div>
          <label for="fArtist">Artist</label>
          <input type="text" id="fArtist" placeholder="Artist / Band">
        </div>
        <div>
          <label for="fTitle">Title</label>
          <input type="text" id="fTitle" placeholder="Album / EP / Single">
        </div>
      </div>

      <div class="form-row three">
        <div>
          <label for="fGenre">Genre / Tag</label>
          <input type="text" id="fGenre" placeholder="e.g. ambient, drone, metal" list="genreList">
          <datalist id="genreList"></datalist>
        </div>
        <div>
          <label for="fReleaseDate">Release Date</label>
          <input type="date" id="fReleaseDate">
        </div>
        <div>
          <label for="fFormat">Format</label>
          <select id="fFormat">
            <option value="">– format –</option>
            <option>LP</option>
            <option>EP</option>
            <option>Single</option>
            <option>Compilation</option>
            <option>Mixtape</option>
            <option>Demo</option>
            <option>Other</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div>
          <label>Rating</label>
          <div class="rating-blocks" id="formRating" role="radiogroup" aria-label="Rating">
            <div class="rating-block" tabindex="0" role="radio" aria-checked="false" aria-label="1 star" onclick="setFormRating(1)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();setFormRating(1);}"></div>
            <div class="rating-block" tabindex="0" role="radio" aria-checked="false" aria-label="2 stars" onclick="setFormRating(2)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();setFormRating(2);}"></div>
            <div class="rating-block" tabindex="0" role="radio" aria-checked="false" aria-label="3 stars" onclick="setFormRating(3)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();setFormRating(3);}"></div>
            <div class="rating-block" tabindex="0" role="radio" aria-checked="false" aria-label="4 stars" onclick="setFormRating(4)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();setFormRating(4);}"></div>
            <div class="rating-block" tabindex="0" role="radio" aria-checked="false" aria-label="5 stars" onclick="setFormRating(5)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();setFormRating(5);}"></div>
          </div>
        </div>
      </div>

      <div class="form-row">
        <div>
          <label for="fNotes">Notes</label>
          <textarea id="fNotes" placeholder="First impressions, standout tracks, context…"></textarea>
        </div>
      </div>

      <div class="check-row">
        <input type="checkbox" id="fListened">
        <label for="fListened">Marked as listened</label>
      </div>

      <div class="btn-row">
        <button class="btn-primary" onclick="saveRelease()">Save Release</button>
        <button class="btn-ghost" id="cancelBtn" onclick="cancelEdit()" style="display:none">Cancel</button>
        <button class="btn-ghost" onclick="clearForm()">Clear</button>
      </div>
      </div>
    </div>

    <!-- FILTERS -->
    <div class="filter-toggle-row">
      <button class="filter-toggle-btn" onclick="toggleFilterPanel()" id="filterToggleBtn">Filters ▾</button>
      <span class="filter-summary" id="filterSummary"></span>
    </div>
    <div class="filter-bar" id="filterBar">
      <span class="filter-label">Filter:</span>
      <input type="text" id="searchInput" placeholder="Artist, title, or genre…" oninput="renderList(); updateFilterSummary();">
      <select id="filterListened" onchange="renderList(); updateFilterSummary();">
        <option value="">All</option>
        <option value="yes">Listened</option>
        <option value="no">To Listen</option>
      </select>
      <select id="filterFormat" onchange="renderList(); updateFilterSummary();">
        <option value="">Any Format</option>
        <option>LP</option>
        <option>EP</option>
        <option>Single</option>
        <option>Compilation</option>
        <option>Mixtape</option>
        <option>Demo</option>
        <option>Other</option>
      </select>
      <select id="filterGenre" onchange="renderList(); updateFilterSummary();">
        <option value="">Any Genre</option>
      </select>
      <select id="filterDecade" onchange="renderList(); updateFilterSummary();">
        <option value="">Any Decade</option>
      </select>
      <select id="filterRating" onchange="renderList(); updateFilterSummary();">
        <option value="">Any Rating</option>
        <option value="5">5★</option>
        <option value="4">4★ and up</option>
        <option value="3">3★ and up</option>
        <option value="2">2★ and up</option>
        <option value="1">1★ and up</option>
      </select>
      <select id="sortBy" onchange="renderList()">
        <option value="year-asc">Release Date ↑</option>
        <option value="year-desc">Release Date ↓</option>
        <option value="added-desc">Newest Added</option>
        <option value="added-asc">Oldest Added</option>
        <option value="rating-desc">Highest Rated</option>
        <option value="artist-asc">Artist A–Z</option>
        <option value="revisits-desc">Most Revisited</option>
      </select>
    </div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:6px;flex-wrap:wrap;">
      <div class="view-toggle" id="viewToggle">
        <button class="view-toggle-btn" data-mode="grid" onclick="setViewMode('grid')" title="Grid view" aria-label="Grid view">▦</button>
        <button class="view-toggle-btn" data-mode="list" onclick="setViewMode('list')" title="List view" aria-label="List view">☰</button>
      </div>
      <div style="display:flex;gap:6px;">
        <button class="btn-action" onclick="importData()" title="Import a backup JSON file">↑ Import</button>
        <button class="btn-action" onclick="exportData()" title="Download a backup JSON file">↓ Export</button>
      </div>
    </div>
    <div class="release-list" id="releaseList"></div>
  </div>

  <!-- STATS TAB -->
  <div id="tabStats" style="display:none">
    <div class="stats-grid" id="statsGrid"></div>
    <div id="statsExtra"></div>
  </div>

</div>

<div class="toast" id="toast"></div>
<div id="modalSlot"></div>

<script type="module">
  // v13: pure date/status/Spotify-parsing helpers now live in lib/pure.js
  // (see node:test suite at lib/pure.test.js) — importing them here means
  // this script must run as a module. Everything below is otherwise
  // unchanged; see the window-exposure block near the bottom, which is the
  // one adjustment modules require for inline onclick="..." handlers to
  // keep resolving these functions.
  import {
    normalizeToIso,
    parseReleaseDate,
    formatReleaseDateDisplay,
    releaseStatus,
    coverKey,
    spotifyDateToIso,
    formatFromSpotifyAlbumType,
    monthlyAddedCounts,
  } from './lib/pure.js';

  // ── State ──────────────────────────────────────────
  // ---- v6: collapsible add-form ----
  function toggleAddForm(){
    const el = document.getElementById('addFormDisclosure');
    const collapsed = el.classList.toggle('collapsed');
    document.querySelector('#addFormDisclosure .disclosure-head').setAttribute('aria-expanded', String(!collapsed));
  }

  // v17: empty-state CTA — opens the add form and focuses the first field,
  // reusing the same disclosure toggle keyboard shortcut "a" wires up.
  function startFirstAdd(){
    document.getElementById('addFormDisclosure').classList.remove('collapsed');
    document.querySelector('#addFormDisclosure .disclosure-head').setAttribute('aria-expanded', 'true');
    document.getElementById('fArtist').focus();
  }

  // ---- v6: mobile filter sheet ----
  function toggleFilterPanel(){
    const bar = document.getElementById('filterBar');
    const btn = document.getElementById('filterToggleBtn');
    const open = bar.classList.toggle('open');
    btn.textContent = open ? 'Filters ▴' : 'Filters ▾';
  }
  // v17: was a plain "N active" count — now one removable chip per active
  // filter, so you can see (and clear) exactly which filters are on
  // without opening the filter bar.
  const FILTER_CHIP_CONTROLS = [
    { id: 'searchInput', label: (v) => `"${v}"` },
    { id: 'filterListened', label: (v) => v === 'yes' ? 'Listened' : 'To Listen' },
    { id: 'filterFormat', label: (v, el) => el.options[el.selectedIndex].text },
    { id: 'filterGenre', label: (v, el) => el.options[el.selectedIndex].text },
    { id: 'filterDecade', label: (v, el) => el.options[el.selectedIndex].text },
    { id: 'filterRating', label: (v, el) => el.options[el.selectedIndex].text },
  ];
  function updateFilterSummary(){
    const summary = document.getElementById('filterSummary');
    if(!summary) return;
    const active = FILTER_CHIP_CONTROLS
      .map(c => ({ ...c, el: document.getElementById(c.id) }))
      .map(c => ({ ...c, value: c.el.value.trim ? c.el.value.trim() : c.el.value }))
      .filter(c => c.value);
    summary.innerHTML = active.map(c =>
      `<span class="filter-chip">${esc(c.label(c.value, c.el))}<button type="button" onclick="clearFilterChip('${c.id}')" aria-label="Remove filter">✕</button></span>`
    ).join('');
  }
  function clearFilterChip(id){
    document.getElementById(id).value = '';
    renderList();
    updateFilterSummary();
  }

  // ---- v6: per-card overflow action menu ----
  // (v7: this menu now only ever renders inside the detail modal, since
  // grid tiles carry no actions — refresh the modal, not the tile grid.)
  let openOverflowId = null;
  function toggleOverflowMenu(id){
    openOverflowId = (openOverflowId === id) ? null : id;
    renderModal();
  }
  function closeOverflowMenu(){
    if(openOverflowId !== null){ openOverflowId = null; renderModal(); }
  }

  // v19: flips the overflow menu to open upward when there isn't room below.
  // The real constraint isn't the viewport — it's .modal-box's own bounding
  // rect, since overflow-y:auto there computes overflow-x to 'auto' too (see
  // the v14 comment on .modal-box), clipping anything that opens past the
  // box's own height even when the viewport itself has room to spare. Runs
  // after renderModal() has already put the (open) menu in the DOM, so
  // getBoundingClientRect reflects real layout.
  function positionOverflowMenu(){
    const menu = document.querySelector('.overflow-menu.open');
    if(!menu) return;
    menu.classList.remove('flip-up');
    const rect = menu.getBoundingClientRect();
    const clipBox = menu.closest('.modal-box');
    const limit = clipBox ? clipBox.getBoundingClientRect().bottom : window.innerHeight;
    if(rect.bottom > limit) menu.classList.add('flip-up');
  }
  document.addEventListener('click', function(e){
    if(openOverflowId !== null && !e.target.closest('.card-actions')){
      closeOverflowMenu();
    }
  });

  // ---- v6: inline two-click confirm for destructive removal ----
  let pendingRemoveId = null;
  let pendingRemoveTimer = null;
  function requestDeleteRelease(id){
    if(pendingRemoveId === id){
      clearTimeout(pendingRemoveTimer);
      pendingRemoveId = null;
      performDeleteRelease(id);
      return;
    }
    pendingRemoveId = id;
    clearTimeout(pendingRemoveTimer);
    pendingRemoveTimer = setTimeout(() => { pendingRemoveId = null; renderModal(); }, 4000);
    renderModal();
  }

  // ---- v6: lightweight custom confirm dialog (replaces native confirm()) ----
  // Used only for the bulk-import flow, where there's no persistent per-item
  // button to attach a two-click confirm to. Returns a Promise<boolean>.
  function showConfirmDialog(message, confirmLabel){
    return new Promise(resolve => {
      const overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;';
      const box = document.createElement('div');
      box.style.cssText = 'background:var(--surface);border:1px solid var(--gold-dim);border-radius:4px;padding:20px 22px;max-width:380px;font-family:var(--font-body);font-size:13px;color:var(--text);line-height:1.6;white-space:pre-line;';
      box.textContent = message;
      const btnRow = document.createElement('div');
      btnRow.style.cssText = 'display:flex;gap:8px;margin-top:16px;justify-content:flex-end;';
      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'btn-ghost';
      cancelBtn.textContent = 'Cancel';
      const okBtn = document.createElement('button');
      okBtn.className = 'btn-primary';
      okBtn.textContent = confirmLabel || 'Confirm';
      btnRow.appendChild(cancelBtn);
      btnRow.appendChild(okBtn);
      box.appendChild(btnRow);
      overlay.appendChild(box);
      document.body.appendChild(overlay);
      function cleanup(result){
        document.body.removeChild(overlay);
        resolve(result);
      }
      cancelBtn.onclick = () => cleanup(false);
      okBtn.onclick = () => cleanup(true);
      overlay.onclick = (e) => { if(e.target === overlay) cleanup(false); };
    });
  }

  // ---- v10: manual artwork override modal ----
  let artworkModalId = null;

  function openArtworkModal(id){
    artworkModalId = id;
    const release = releases.find(r => r.id === id);
    if(!release) return;
    if(openOverflowId === id){ openOverflowId = null; renderList(); }

    const overlay = document.createElement('div');
    overlay.id = 'artworkModalOverlay';
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;z-index:300;padding:20px;';
    const box = document.createElement('div');
    box.style.cssText = 'background:var(--surface);border:1px solid var(--gold-dim);border-radius:4px;padding:20px 22px;max-width:380px;width:100%;font-family:var(--font-body);font-size:13px;color:var(--text);';

    box.innerHTML = `
      <div style="font-family:var(--font-display);font-size:14px;font-weight:600;margin-bottom:4px;">Edit artwork</div>
      <div style="color:var(--text-dim);font-size:12px;margin-bottom:14px;">${esc(release.artist)}${release.title ? ' — ' + esc(release.title) : ''}</div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        <input type="file" id="artworkFileInput" accept="image/*" style="font-size:12px;">
        <div style="text-align:center;color:var(--text-dim);font-size:11px;">— or —</div>
        <input type="text" id="artworkUrlInput" placeholder="Paste an image URL" style="width:100%;box-sizing:border-box;">
      </div>
      <div id="artworkModalStatus" style="font-size:12px;color:var(--text-dim);margin-top:10px;min-height:16px;"></div>
      <div style="display:flex;gap:8px;margin-top:14px;justify-content:space-between;">
        <button class="btn-ghost" id="artworkRemoveBtn" ${release.coverOverride ? '' : 'style="visibility:hidden;"'}>Remove override</button>
        <div style="display:flex;gap:8px;">
          <button class="btn-ghost" id="artworkCancelBtn">Cancel</button>
          <button class="btn-primary" id="artworkSaveBtn">Save</button>
        </div>
      </div>
    `;
    overlay.appendChild(box);
    document.body.appendChild(overlay);

    document.getElementById('artworkCancelBtn').onclick = closeArtworkModal;
    overlay.onclick = (e) => { if(e.target === overlay) closeArtworkModal(); };
    document.getElementById('artworkRemoveBtn').onclick = () => removeArtworkOverride(id);
    document.getElementById('artworkSaveBtn').onclick = () => saveArtworkFromModal(id);
    focusModal(overlay);
  }

  function closeArtworkModal(){
    const overlay = document.getElementById('artworkModalOverlay');
    if(overlay) document.body.removeChild(overlay);
    artworkModalId = null;
    restoreModalFocus();
  }

  function setArtworkModalStatus(msg){
    const el = document.getElementById('artworkModalStatus');
    if(el) el.textContent = msg;
  }

  async function saveArtworkFromModal(id){
    const fileInput = document.getElementById('artworkFileInput');
    const urlInput = document.getElementById('artworkUrlInput');
    const file = fileInput && fileInput.files && fileInput.files[0];
    const url = urlInput ? urlInput.value.trim() : '';

    if(file){
      await uploadArtworkFile(id, file);
    } else if(url){
      await saveArtworkUrl(id, url);
    } else {
      setArtworkModalStatus('Choose a file or paste a URL first.');
    }
  }

  // URL path: a normal Airtable field PATCH — Airtable fetches and hosts the
  // image itself, no Worker changes needed beyond the existing proxy route.
  async function saveArtworkUrl(id, url){
    setArtworkModalStatus('Saving…');
    try{
      const data = await airtableRequest(API_URL, {
        method: 'PATCH',
        body: JSON.stringify({ records: [{ id, fields: { 'Cover Override': [{ url }] } }] })
      });
      applyArtworkResult(id, data.records[0]);
      closeArtworkModal();
      showToast('Artwork updated.');
    }catch(e){
      console.error('Artwork URL save failed:', e);
      setArtworkModalStatus('Could not save that URL — check it and try again.');
    }
  }

  // File path: base64-encode and send to the Worker's dedicated upload route,
  // which forwards to Airtable's content-upload API (requires the field ID,
  // not just the field name — see Worker deployment notes).
  function fileToBase64(file){
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  async function uploadArtworkFile(id, file){
    setArtworkModalStatus('Uploading…');
    try{
      const base64 = await fileToBase64(file);
      const res = await fetch(ATTACHMENT_UPLOAD_URL, {
        method: 'POST',
        credentials: 'include', // v16: carries the Cloudflare Access session cookie cross-origin
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          recordId: id,
          filename: file.name || 'cover.jpg',
          contentType: file.type || 'image/jpeg',
          file: base64,
        })
      });
      if(!res.ok) throw new Error(`Upload error ${res.status}`);
      const data = await res.json();
      // Airtable's uploadAttachment response nests the updated field under fields.
      const updatedField = data.fields && data.fields['Cover Override'];
      applyArtworkResult(id, { fields: { 'Cover Override': updatedField } });
      closeArtworkModal();
      showToast('Artwork updated.');
    }catch(e){
      console.error('Artwork upload failed:', e);
      setArtworkModalStatus('Upload failed — check your connection and try again.');
    }
  }

  async function removeArtworkOverride(id){
    setArtworkModalStatus('Removing…');
    try{
      await airtableRequest(API_URL, {
        method: 'PATCH',
        body: JSON.stringify({ records: [{ id, fields: { 'Cover Override': [] } }] })
      });
      const idx = releases.findIndex(r => r.id === id);
      if(idx !== -1) releases[idx].coverOverride = null;
      closeArtworkModal();
      renderFriday();
      renderHero();
      renderList();
      renderModal();
      showToast('Reverted to auto-lookup.');
    }catch(e){
      console.error('Artwork remove failed:', e);
      setArtworkModalStatus('Could not remove override — try again.');
    }
  }

  function applyArtworkResult(id, record){
    const f = (record && record.fields) || {};
    const url = (f['Cover Override'] && f['Cover Override'][0] && f['Cover Override'][0].url) || null;
    const idx = releases.findIndex(r => r.id === id);
    if(idx !== -1) releases[idx].coverOverride = url;
    renderFriday();
    renderHero();
    renderList();
    renderModal();
  }

  let releases = [];

  // Cover art cache (Apple iTunes Search API, keyed by lowercase "artist|||title").
  // Value is an artwork URL once resolved, or null if a lookup found nothing.
  const coverCache = {};

  async function fetchCover(release){
    const { artist, title, id } = release;
    const key = coverKey(artist, title);
    if(key in coverCache) return coverCache[key];
    coverCache[key] = undefined; // mark in-flight
    try{
      const term = `${artist || ''} ${title || ''}`.trim();
      const params = new URLSearchParams({ term, entity: 'album', limit: '1' });
      const res = await fetch(`https://itunes.apple.com/search?${params.toString()}`);
      const data = await res.json();
      const hit = data.results && data.results[0];
      coverCache[key] = hit && hit.artworkUrl100
        ? hit.artworkUrl100.replace('100x100', '300x300')
        : null;
    }catch(e){
      coverCache[key] = null;
    }
    // v13: this only runs when there was no persisted "Cover Cache URL" yet
    // (coverHtml checks that before ever calling fetchCover) — write the
    // resolved URL back so future sessions/devices skip the iTunes lookup.
    if(coverCache[key] && id) persistCoverCacheUrl(id, coverCache[key]);
    renderFriday();
    renderHero();
    renderList();
    return coverCache[key];
  }

  // Best-effort, never blocks rendering — same pattern as the artwork-override
  // PATCH writes above. Updates the in-memory release too, so a re-render
  // (e.g. after "Remove override") reads the persisted URL immediately.
  function persistCoverCacheUrl(id, url){
    airtableRequest(API_URL, {
      method: 'PATCH',
      body: JSON.stringify({ records: [{ id, fields: { 'Cover Cache URL': url } }] })
    }).then(() => {
      const idx = releases.findIndex(r => r.id === id);
      if(idx !== -1) releases[idx].coverCacheUrl = url;
    }).catch(e => console.error('Cover cache persist failed:', e));
  }

  // Returns cover HTML for a release, kicking off a background lookup the
  // first time a given artist/title pair is seen.
  const COVER_VARIANT_CLASSES = {
    hero: ['hero-cover', 'hero-cover-placeholder'],
    card: ['cover-thumb', 'cover-placeholder'],
    tile: ['tile-cover', 'tile-cover-placeholder'],
    friday: ['friday-cover', 'friday-cover-placeholder'],
  };
  // v10: manual artwork override — if a release has a Cover Override
  // attachment set in Airtable, it always wins over the iTunes auto-lookup
  // (checked first, no fetch needed). The edit pencil only shows on the
  // 'hero' and 'card' variants (Queued-to-listen box and the detail modal)
  // — grid tiles/list rows/Friday box stay read-only to avoid clutter.
  const EDITABLE_COVER_VARIANTS = ['hero', 'card'];
  function coverHtml(release, variant){
    const [imgClass, placeholderClass] = COVER_VARIANT_CLASSES[variant] || COVER_VARIANT_CLASSES.card;
    const editable = EDITABLE_COVER_VARIANTS.includes(variant);
    const editBtn = editable
      ? `<button class="cover-edit-btn ${variant}" onclick="event.stopPropagation();openArtworkModal('${release.id}')" title="Edit artwork" aria-label="Edit artwork">✎</button>`
      : '';
    const wrap = (inner) => editable ? `<div class="cover-wrap ${variant}">${inner}${editBtn}</div>` : inner;

    // v17: fade in once loaded — cover-loading starts at opacity 0, the
    // onload handler adds cover-loaded which CSS transitions to opacity 1
    // (no-op outside prefers-reduced-motion:no-preference, see styles.css).
    if(release.coverOverride){
      return wrap(`<img class="${imgClass} cover-loading" onload="this.classList.add('cover-loaded')" src="${release.coverOverride}" alt="" loading="lazy">`);
    }

    // v13: persisted auto-lookup — set once fetchCover resolves successfully,
    // read on every subsequent load (any device) with no iTunes call at all.
    if(release.coverCacheUrl){
      return wrap(`<img class="${imgClass} cover-loading" onload="this.classList.add('cover-loaded')" src="${release.coverCacheUrl}" alt="" loading="lazy">`);
    }

    const key = coverKey(release.artist, release.title);
    const cached = coverCache[key];
    if(cached === undefined){
      if(!(key in coverCache)) fetchCover(release);
      return wrap(`<div class="${placeholderClass}">🎵</div>`);
    }
    if(!cached) return wrap(`<div class="${placeholderClass}">🎵</div>`);
    return wrap(`<img class="${imgClass} cover-loading" onload="this.classList.add('cover-loaded')" src="${cached}" alt="" loading="lazy">`);
  }
  let formRating = 0;
  let editingId = null;

  // ── Airtable connection (via Cloudflare Worker proxy) ─
  // The Airtable token now lives only in the Worker's environment secrets —
  // it is never present in this file or in page source. Replace WORKER_URL
  // below with your deployed Worker's URL.
  const WORKER_URL = 'https://api.foundfrequency.com';
  const API_URL = WORKER_URL;
  // The same Worker also proxies Spotify Web API search (Client Credentials
  // flow, app-only — no user Spotify login needed). See music-tracker-worker.js.
  const SPOTIFY_PROXY_URL = `${WORKER_URL}/spotify`;
  // v10: manual artwork override — file uploads go through a dedicated Worker
  // route that proxies Airtable's content-upload API (see reference doc /
  // deployment notes for the Worker-side snippet this requires).
  const ATTACHMENT_UPLOAD_URL = `${WORKER_URL}/upload-attachment`;

  async function airtableRequest(url, options = {}) {
    // Auth now happens inside the Worker — no token is attached client-side.
    const res = await fetch(url, {
      ...options,
      credentials: 'include', // v16: carries the Cloudflare Access session cookie cross-origin
      headers: {
        'Content-Type': 'application/json',
        ...(options.headers || {})
      }
    });
    if (!res.ok) {
      const errText = await res.text();
      throw new Error(`Airtable error ${res.status}: ${errText}`);
    }
    return res.json();
  }

  function recordToRelease(record) {
    const f = record.fields || {};
    return {
      id: record.id,
      artist: f['Artist'] || '',
      title: f['Title'] || '',
      genre: f['Genre'] || '',
      year: f['Release Date'] || '',
      format: f['Format'] || '',
      rating: f['Rating'] || 0,
      notes: f['Notes'] || '',
      listened: !!f['Listened'],
      revisits: f['Revisits'] || 0,
      addedAt: f['Added At'] || Date.now(),
      updatedAt: f['Updated At'] || Date.now(),
      spotifyAdded: !!f['Spotify Added'],
      spotifyUrl: f['Spotify URL'] || '', // v9: exact album link, blank for manual/older entries
      coverOverride: (f['Cover Override'] && f['Cover Override'][0] && f['Cover Override'][0].url) || null, // v10
      coverCacheUrl: f['Cover Cache URL'] || '', // v13: persisted auto-resolved iTunes lookup
    };
  }

  function releaseToFields(entry) {
    return {
      'Artist': entry.artist,
      'Title': entry.title,
      'Genre': entry.genre,
      'Release Date': entry.year,
      'Format': entry.format || null,
      'Rating': entry.rating,
      'Notes': entry.notes,
      'Listened': entry.listened,
      'Revisits': entry.revisits,
      'Added At': entry.addedAt,
      'Updated At': entry.updatedAt,
      'Spotify Added': !!entry.spotifyAdded,
      'Spotify URL': entry.spotifyUrl || null, // v9
    };
  }

  // ── Release Date parsing (v7: native date input) ────
  // Release Date is now saved as ISO (YYYY-MM-DD) going forward, but older
  // records may still hold the legacy dd/mm/yyyy or bare-year strings that
  // v6's text field and Spotify autofill used to write — these helpers
  // accept both so existing entries keep displaying/sorting correctly.
  // (v13: normalizeToIso/parseReleaseDate/formatReleaseDateDisplay/releaseStatus
  // now live in lib/pure.js, imported at the top of this script.)

  function releaseStatusBadge(status){
    if(status === 'listened') return { cls: 'badge-listened', text: 'Listened' };
    if(status === 'upcoming') return { cls: 'badge-upcoming', text: 'Upcoming' };
    return { cls: 'badge-unlistened', text: 'Not yet' };
  }

  // ── Storage ────────────────────────────────────────
  // v17: skeleton tiles instead of plain "Loading…" text, matching the
  // grid tile's aspect ratio so the layout doesn't jump once data arrives.
  function skeletonTilesHtml(count){
    return '<div class="release-list">' + Array(count).fill('<div class="skeleton-tile"></div>').join('') + '</div>';
  }

  async function loadReleases() {
    const container = document.getElementById('releaseList');
    container.innerHTML = skeletonTilesHtml(6);
    try {
      let all = [];
      let offset = null;
      do {
        const url = offset ? `${API_URL}?offset=${offset}` : API_URL;
        const data = await airtableRequest(url);
        all = all.concat(data.records);
        offset = data.offset;
      } while (offset);
      releases = all.map(recordToRelease);
      localStorage.setItem('musicTrackerDataCache', JSON.stringify({ releases, cachedAt: Date.now() }));
      hideOfflineBanner();
    } catch (e) {
      console.error('Load failed:', e);
      if (!loadFromDataCache()) {
        container.innerHTML = '<div class="empty-state"><p>Could not load your collection — check the connection and reload.</p></div>';
      }
      return;
    }
    renderGenreFilters();
    renderFriday();
    renderHero();
    renderList();
    updateHeaderStats();
    openHashModalIfPresent();
  }

  // v17: on initial load, reopen a release modal deep-linked via
  // #release/{id} (see openReleaseModal/closeReleaseModal above).
  function openHashModalIfPresent(){
    const m = location.hash.match(/^#release\/(.+)$/);
    if(m && releases.find(r => r.id === m[1])) openReleaseModal(m[1]);
  }

  // v14: offline read fallback — falls back to the last successful load's
  // snapshot when a fresh fetch fails, so browsing (not editing) still
  // works with no connection. Writes for edits/adds still fail normally
  // and surface their existing "check your connection" toasts.
  function loadFromDataCache() {
    let cache;
    try {
      cache = JSON.parse(localStorage.getItem('musicTrackerDataCache'));
    } catch (e) {
      cache = null;
    }
    if (!cache || !cache.releases) return false;
    releases = cache.releases;
    renderGenreFilters();
    renderFriday();
    renderHero();
    renderList();
    updateHeaderStats();
    showOfflineBanner(cache.cachedAt);
    openHashModalIfPresent();
    return true;
  }

  function showOfflineBanner(cachedAt) {
    const when = cachedAt ? new Date(cachedAt).toLocaleString() : 'an earlier session';
    document.getElementById('offlineBannerSlot').innerHTML = `
      <div class="offline-banner">
        <span>Offline — showing your collection as of ${esc(when)}.</span>
        <button class="dismiss" onclick="hideOfflineBanner()" title="Dismiss" aria-label="Dismiss">✕</button>
      </div>
    `;
  }

  function hideOfflineBanner() {
    document.getElementById('offlineBannerSlot').innerHTML = '';
  }

  // ── Form Rating ────────────────────────────────────
  function setFormRating(val) {
    // Toggle off if clicking same value
    formRating = (formRating === val) ? 0 : val;
    updateFormRatingUI();
  }

  function updateFormRatingUI() {
    const blocks = document.querySelectorAll('#formRating .rating-block');
    blocks.forEach((b, i) => {
      b.classList.toggle('filled', i < formRating);
      b.setAttribute('aria-checked', String(i === formRating - 1));
    });
  }

  // ── Save / Edit ────────────────────────────────────
  // ── Spotify-assisted add ────────────────────────────
  // Uses the Worker's Spotify proxy (Client Credentials — public catalog
  // search only, no user login). Lets you search Spotify's catalog and
  // autofill Artist/Title/Release Date/Format/Genre from a result.
  let lastSpotifyResults = [];
  let filledFromSpotify = false;
  // v9: exact album link (external_urls.spotify) captured alongside the
  // autofill, saved to the "Spotify URL" Airtable field on create.
  let spotifyUrlFromSearch = '';

  async function spotifySearch(){
    const q = document.getElementById('spotifySearchInput').value.trim();
    const resultsEl = document.getElementById('spotifyResults');
    if(!q){
      resultsEl.innerHTML = '';
      return;
    }
    resultsEl.innerHTML = '<div class="spotify-status">Searching…</div>';
    try{
      const params = new URLSearchParams({ q, type: 'album', limit: '5' });
      const res = await fetch(`${SPOTIFY_PROXY_URL}/v1/search?${params.toString()}`, { credentials: 'include' });
      if(!res.ok) throw new Error(`Spotify search error ${res.status}`);
      const data = await res.json();
      lastSpotifyResults = (data.albums && data.albums.items) || [];
      if(lastSpotifyResults.length === 0){
        resultsEl.innerHTML = '<div class="spotify-status">No matches — try a different search, or just fill the fields in by hand.</div>';
        return;
      }
      resultsEl.innerHTML = `<div class="spotify-results">` + lastSpotifyResults.map((album, i) => {
        const artistName = (album.artists || []).map(a => a.name).join(', ');
        const img = album.images && album.images[album.images.length > 1 ? 1 : 0];
        const cover = img
          ? `<img src="${img.url}" alt="">`
          : `<div class="cover-placeholder" style="width:36px;height:36px;">🎵</div>`;
        return `
          <div class="spotify-result-item" onclick="applySpotifyResult(${i})">
            ${cover}
            <div class="spotify-result-text">
              <div class="spotify-result-artist">${esc(artistName)} — ${esc(album.name)}</div>
              <div class="spotify-result-meta">${esc(album.release_date || '')} · ${esc(album.album_type || '')}</div>
            </div>
          </div>
        `;
      }).join('') + `</div>`;
    }catch(e){
      console.error('Spotify search failed:', e);
      resultsEl.innerHTML = '<div class="spotify-status">Search failed — check your connection, or just fill the fields in by hand.</div>';
    }
  }

  // (v13: formatFromSpotifyAlbumType/spotifyDateToIso now live in lib/pure.js,
  // imported at the top of this script.)

  async function applySpotifyResult(index){
    const album = lastSpotifyResults[index];
    if(!album) return;
    const artistName = (album.artists || []).map(a => a.name).join(', ');

    document.getElementById('fArtist').value = artistName;
    document.getElementById('fTitle').value = album.name || '';
    document.getElementById('fReleaseDate').value = spotifyDateToIso(album.release_date);
    document.getElementById('fFormat').value = formatFromSpotifyAlbumType(album.album_type, album.total_tracks);

    // v9: keep the exact album link so the saved release can deep-link
    // straight to Spotify instead of falling back to a search.
    spotifyUrlFromSearch = (album.external_urls && album.external_urls.spotify) || '';

    // Genre isn't on the album object — look it up via the primary artist,
    // best-effort only (fine if it fails, genre just stays blank).
    const primaryArtistId = album.artists && album.artists[0] && album.artists[0].id;
    if(primaryArtistId){
      try{
        const res = await fetch(`${SPOTIFY_PROXY_URL}/v1/artists/${primaryArtistId}`, { credentials: 'include' });
        if(res.ok){
          const artistData = await res.json();
          if(artistData.genres && artistData.genres.length){
            document.getElementById('fGenre').value = artistData.genres.slice(0, 3).join(', ');
          }
        }
      }catch(e){
        console.error('Spotify artist genre lookup failed:', e);
      }
    }

    document.getElementById('spotifyResults').innerHTML = '';
    document.getElementById('spotifySearchInput').value = '';
    filledFromSpotify = true;
    showToast('Filled in from Spotify — check it over before saving.');
  }

  let pendingDuplicateKey = null;
  let pendingDuplicateTimer = null;

  async function saveRelease() {
    const artist = document.getElementById('fArtist').value.trim();
    const title = document.getElementById('fTitle').value.trim();
    if (!artist && !title) { showToast('Add at least an artist or title.'); return; }

    if (!editingId) {
      const dupe = findDuplicate(artist, title);
      const dupeKey = artist.toLowerCase() + '|||' + title.toLowerCase();
      if (dupe && pendingDuplicateKey !== dupeKey) {
        pendingDuplicateKey = dupeKey;
        clearTimeout(pendingDuplicateTimer);
        pendingDuplicateTimer = setTimeout(() => { pendingDuplicateKey = null; }, 6000);
        showToast(`Looks like "${dupe.title || '(no title)'}" — ${dupe.artist || '(no artist)'} is already here. Click Save again to add it anyway.`);
        return;
      }
      pendingDuplicateKey = null;
    }

    const existing = editingId ? releases.find(r => r.id === editingId) : null;

    const entry = {
      id: editingId || null,
      artist,
      title,
      genre: normalizeGenreString(document.getElementById('fGenre').value),
      year: document.getElementById('fReleaseDate').value,
      format: document.getElementById('fFormat').value,
      rating: formRating,
      notes: document.getElementById('fNotes').value.trim(),
      listened: document.getElementById('fListened').checked,
      revisits: existing ? (existing.revisits || 0) : 0,
      addedAt: existing ? existing.addedAt : Date.now(),
      updatedAt: Date.now(),
      spotifyAdded: existing ? !!existing.spotifyAdded : filledFromSpotify,
      spotifyUrl: existing ? (existing.spotifyUrl || '') : spotifyUrlFromSearch, // v9: preserved on edit
    };

    const wasEditing = !!editingId;
    try {
      if (editingId) {
        await airtableRequest(API_URL, {
          method: 'PATCH',
          body: JSON.stringify({ records: [{ id: editingId, fields: releaseToFields(entry) }] })
        });
        entry.id = editingId;
        const idx = releases.findIndex(r => r.id === editingId);
        if (idx !== -1) releases[idx] = entry;
      } else {
        const data = await airtableRequest(API_URL, {
          method: 'POST',
          body: JSON.stringify({ records: [{ fields: releaseToFields(entry) }] })
        });
        releases.unshift(recordToRelease(data.records[0]));
      }
    } catch (e) {
      console.error('Save failed:', e);
      showToast('Could not save — check your connection and try again.');
      return;
    }

    editingId = null;
    clearForm();
    renderGenreFilters();
    renderFriday();
    renderHero();
    renderList();
    updateHeaderStats();
    showToast(wasEditing ? 'Updated.' : 'Release saved.');
    document.getElementById('formLabel').textContent = 'Add Release';
    document.getElementById('cancelBtn').style.display = 'none';
    if (wasEditing) document.getElementById('addFormDisclosure').classList.add('collapsed');
  }

  function editRelease(id) {
    const r = releases.find(x => x.id === id);
    if (!r) return;
    editingId = id;
    filledFromSpotify = false;
    spotifyUrlFromSearch = ''; // v9
    document.getElementById('fArtist').value = r.artist;
    document.getElementById('fTitle').value = r.title;
    document.getElementById('fGenre').value = r.genre;
    document.getElementById('fReleaseDate').value = normalizeToIso(r.year);
    document.getElementById('fFormat').value = r.format;
    document.getElementById('fNotes').value = r.notes;
    document.getElementById('fListened').checked = r.listened;
    formRating = r.rating;
    updateFormRatingUI();
    document.getElementById('formLabel').textContent = 'Edit Release';
    document.getElementById('cancelBtn').style.display = '';
    document.getElementById('addFormDisclosure').classList.remove('collapsed');
    closeOverflowMenu();
    openModalId = null;
    renderModal();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function cancelEdit() {
    editingId = null;
    clearForm();
    document.getElementById('formLabel').textContent = 'Add Release';
    document.getElementById('cancelBtn').style.display = 'none';
    document.getElementById('addFormDisclosure').classList.add('collapsed');
  }

  function clearForm() {
    ['fArtist','fTitle','fGenre','fReleaseDate','fNotes'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('fFormat').value = '';
    document.getElementById('fListened').checked = false;
    formRating = 0;
    updateFormRatingUI();
    filledFromSpotify = false;
    spotifyUrlFromSearch = ''; // v9
  }

  async function performDeleteRelease(id) {
    try {
      await airtableRequest(`${API_URL}?records[]=${id}`, { method: 'DELETE' });
      releases = releases.filter(r => r.id !== id);
    } catch (e) {
      console.error('Delete failed:', e);
      showToast('Could not remove — check your connection and try again.');
      return;
    }
    closeOverflowMenu();
    if(openModalId === id) openModalId = null;
    renderGenreFilters();
    renderFriday();
    renderHero();
    renderList();
    updateHeaderStats();
    showToast('Removed.');
  }

  async function toggleListened(id) {
    const r = releases.find(x => x.id === id);
    if (!r) return;
    const newVal = !r.listened;
    const newUpdatedAt = Date.now();
    try {
      await airtableRequest(API_URL, {
        method: 'PATCH',
        body: JSON.stringify({ records: [{ id, fields: { 'Listened': newVal, 'Updated At': newUpdatedAt } }] })
      });
      r.listened = newVal;
      r.updatedAt = newUpdatedAt;
    } catch (e) {
      console.error('Update failed:', e);
      showToast('Could not update — check your connection and try again.');
      return;
    }
    renderFriday();
    renderHero();
    renderList();
    updateHeaderStats();
  }

  // v17: change a release's rating straight from the modal, without opening
  // the full Edit form — same PATCH-then-re-render pattern as toggleListened.
  async function updateRatingInline(id, value) {
    const r = releases.find(x => x.id === id);
    if (!r) return;
    const prevRating = r.rating;
    const newUpdatedAt = Date.now();
    try {
      await airtableRequest(API_URL, {
        method: 'PATCH',
        body: JSON.stringify({ records: [{ id, fields: { 'Rating': value, 'Updated At': newUpdatedAt } }] })
      });
      r.rating = value;
      r.updatedAt = newUpdatedAt;
    } catch (e) {
      console.error('Rating update failed:', e);
      showToast('Could not update rating — check your connection and try again.');
      return;
    }
    if (prevRating !== value) { renderList(); updateHeaderStats(); }
    renderModal();
  }

  // ── Genre taxonomy (v13) ───────────────────────────
  // Trims + collapses whitespace on each comma-separated tag. Doesn't
  // lowercase or reject unrecognized tags — this is a personal tool, not a
  // controlled vocabulary, so autocomplete + light normalization is the
  // whole strategy (see brief: avoid fighting the free-text Spotify autofill).
  function normalizeGenreString(str){
    if(!str) return '';
    return str.split(',').map(g => g.trim().replace(/\s+/g, ' ')).filter(Boolean).join(', ');
  }

  // Distinct genre tags already in use, case preserved (first occurrence
  // wins), keyed by lowercase so callers can dedupe/match case-insensitively.
  // Shared by the datalist autocomplete and the genre filter dropdown so
  // they can't drift out of sync with each other.
  function collectGenreTags(){
    const seen = new Map();
    releases.forEach(r => {
      if(!r.genre) return;
      r.genre.split(',').forEach(g => {
        const trimmed = g.trim();
        if(!trimmed) return;
        const key = trimmed.toLowerCase();
        if(!seen.has(key)) seen.set(key, trimmed);
      });
    });
    return seen;
  }

  // Decades that actually have a release (only show non-empty options).
  function collectDecades(){
    const set = new Set();
    releases.forEach(r => {
      const d = parseReleaseDate(r.year);
      if(d) set.add(Math.floor(d.getFullYear() / 10) * 10);
    });
    return [...set].sort((a, b) => b - a);
  }

  // Repopulates the genre datalist + genre/decade filter dropdowns from the
  // current `releases` — called anywhere releases are added/removed/edited,
  // same as the other render*() functions. Preserves the current filter
  // selection across the rebuild.
  function renderGenreFilters(){
    const tags = [...collectGenreTags().entries()].sort((a, b) => a[1].localeCompare(b[1]));

    const datalist = document.getElementById('genreList');
    if(datalist) datalist.innerHTML = tags.map(([, label]) => `<option value="${esc(label)}"></option>`).join('');

    const genreSelect = document.getElementById('filterGenre');
    if(genreSelect){
      const current = genreSelect.value;
      genreSelect.innerHTML = '<option value="">Any Genre</option>'
        + tags.map(([key, label]) => `<option value="${esc(key)}">${esc(label)}</option>`).join('');
      genreSelect.value = tags.some(([key]) => key === current) ? current : '';
    }

    const decadeSelect = document.getElementById('filterDecade');
    if(decadeSelect){
      const current = decadeSelect.value;
      const decades = collectDecades();
      decadeSelect.innerHTML = '<option value="">Any Decade</option>'
        + decades.map(d => `<option value="${d}">${d}s</option>`).join('');
      decadeSelect.value = decades.some(d => String(d) === current) ? current : '';
    }
  }

  // Diacritic-insensitive, case-insensitive comparison (e.g. "Sigur Ros"
  // matches "Sigur Rós") — cheap normalization, no library needed.
  function normalizeForSearch(str){
    return (str || '').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
  }

  // ── Render ─────────────────────────────────────────
  function getFiltered() {
    const q = normalizeForSearch(document.getElementById('searchInput').value.trim());
    const fl = document.getElementById('filterListened').value;
    const ff = document.getElementById('filterFormat').value;
    const fg = document.getElementById('filterGenre').value;
    const fd = document.getElementById('filterDecade').value;
    const fr = document.getElementById('filterRating').value;
    const sort = document.getElementById('sortBy').value;

    let list = releases.filter(r => {
      if (q && !normalizeForSearch(r.artist).includes(q) && !normalizeForSearch(r.title).includes(q) && !normalizeForSearch(r.genre).includes(q)) return false;
      if (fl === 'yes' && !r.listened) return false;
      if (fl === 'no' && r.listened) return false;
      if (ff && r.format !== ff) return false;
      if (fg && !(r.genre && r.genre.split(',').some(g => g.trim().toLowerCase() === fg))) return false;
      if (fd) {
        const d = parseReleaseDate(r.year);
        if (!d || String(Math.floor(d.getFullYear() / 10) * 10) !== fd) return false;
      }
      if (fr && r.rating < Number(fr)) return false;
      return true;
    });

    list.sort((a, b) => {
      if (sort === 'added-desc') return b.addedAt - a.addedAt;
      if (sort === 'added-asc') return a.addedAt - b.addedAt;
      if (sort === 'rating-desc') return b.rating - a.rating;
      if (sort === 'artist-asc') return a.artist.localeCompare(b.artist);
      if (sort === 'revisits-desc') return (b.revisits || 0) - (a.revisits || 0);
      if (sort === 'year-desc' || sort === 'year-asc') {
        const da = parseReleaseDate(a.year);
        const db = parseReleaseDate(b.year);
        const diff = (da ? da.getTime() : 0) - (db ? db.getTime() : 0);
        return sort === 'year-desc' ? -diff : diff;
      }
      return 0;
    });

    return list;
  }

  function ratingDots(rating) {
    let html = '';
    for (let i = 1; i <= 5; i++) {
      html += `<div class="card-dot${i <= rating ? ' filled' : ''}"></div>`;
    }
    return html;
  }

  // v17: clickable variant used only inside the detail modal — grid tiles
  // and list rows keep the static ratingDots() above (read-only). Always
  // renders all 5 dots (not just when rating > 0) so a 0-rated release has
  // somewhere to click.
  function interactiveRatingDots(id, rating) {
    let html = '';
    for (let i = 1; i <= 5; i++) {
      html += `<div class="card-dot${i <= rating ? ' filled' : ''}" onclick="event.stopPropagation();updateRatingInline('${id}', ${i})" title="Rate ${i} star${i > 1 ? 's' : ''}"></div>`;
    }
    return html;
  }

  // v8: candidates are unlistened AND already released — upcoming releases
  // surface via the "Out This Friday" box / their own status badge instead,
  // not the "queued to listen" hero.
  // v12: hero card opens the release modal + shows a Spotify link, matching
  // the Friday box and grid tiles.
  // v17: tracks the previously-rendered hero id so renderHero() can tell a
  // genuine hero swap (crossfade) apart from a re-render of the same pick
  // (e.g. after toggling a filter) — same pattern as openModalId/viewMode.
  let lastHeroId = null;
  function renderHero(){
    const heroSlot = document.getElementById('heroSlot');
    const candidates = releases.filter(r => releaseStatus(r) === 'unlistened');
    if(candidates.length === 0){
      lastHeroId = null;
      heroSlot.innerHTML = releases.length === 0
        ? ''
        : '<div class="hero-empty">Nothing released and unheard right now — check back after the next drop.</div>';
      return;
    }
    const next = [...candidates].sort((a,b) => b.addedAt - a.addedAt)[0];
    const isNewHero = lastHeroId !== null && lastHeroId !== next.id;
    lastHeroId = next.id;
    // v17: "Surprise me" only makes sense with more than one candidate to
    // pick from — a pool of 1 is just the hero itself.
    const surpriseBtn = candidates.length > 1
      ? `<button class="btn-ghost surprise-btn" onclick="surpriseMe()">🎲 Surprise me</button>`
      : '';
    heroSlot.innerHTML = `
      <div class="hero-card${isNewHero ? ' hero-fade' : ''}" tabindex="0" role="button" aria-label="Open ${esc(next.artist)}${next.title ? ' — ' + esc(next.title) : ''}" onclick="openReleaseModal('${next.id}')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openReleaseModal('${next.id}');}">
        ${coverHtml(next, 'hero')}
        <div class="hero-text">
          <div class="hero-tag">Queued to listen</div>
          <div class="hero-artist">${esc(next.artist)}</div>
          ${next.title ? `<div class="hero-album">${esc(next.title)}</div>` : ''}
          <div class="hero-links">${spotifyLinkHtml(next)}</div>
        </div>
      </div>
      ${surpriseBtn}
    `;
  }

  // v17: picks a random unlistened-and-released release and opens its
  // detail modal — an alternate entry point alongside the single
  // most-recently-added hero pick above.
  function surpriseMe(){
    const candidates = releases.filter(r => releaseStatus(r) === 'unlistened');
    if(!candidates.length) return;
    const pick = candidates[Math.floor(Math.random() * candidates.length)];
    openReleaseModal(pick.id);
  }

  // ---- v10: "New releases: Friday <date>" — the most recent Friday
  // on-or-before today. Unlike the old "nearest upcoming Friday" logic,
  // this holds steady all week (Fri through next Thu) instead of jumping
  // forward the moment Friday ends, so the week's releases stay visible
  // until the next release Friday actually arrives.
  function currentReleaseFriday(){
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const diff = (today.getDay() - 5 + 7) % 7;
    const friday = new Date(today);
    friday.setDate(today.getDate() - diff);
    return friday;
  }

  function renderFriday(){
    const slot = document.getElementById('fridaySlot');
    const friday = currentReleaseFriday();
    const matches = releases.filter(r => {
      const d = parseReleaseDate(r.year);
      return !!d
        && !r.listened // v18: drop out once marked listened
        && d.getFullYear() === friday.getFullYear()
        && d.getMonth() === friday.getMonth()
        && d.getDate() === friday.getDate();
    });
    if(matches.length === 0){ slot.innerHTML = ''; return; }
    const label = `New releases: Friday ${friday.getDate()} ${MONTH_NAMES[friday.getMonth()]}`;
    slot.innerHTML = `
      <div class="friday-box">
        <div class="friday-tag">${esc(label)}</div>
        <div class="friday-list">
          ${matches.map(r => `
            <div class="friday-item" tabindex="0" role="button" aria-label="Open ${esc(r.artist)}${r.title ? ' — ' + esc(r.title) : ''}" onclick="openReleaseModal('${r.id}')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openReleaseModal('${r.id}');}">
              ${coverHtml(r, 'friday')}
              <div class="friday-item-text">
                <div class="friday-item-artist">${esc(r.artist)}</div>
                ${r.title ? `<div class="friday-item-title">${esc(r.title)}</div>` : ''}
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }

  // ---- v7: hybrid grid + detail modal ----
  // Which release's detail modal is open lives in this JS variable — the
  // same render-from-scratch pattern as openOverflowId/pendingRemoveId.
  let openModalId = null;

  // ---- v8: grid/list view mode ----
  // Source of truth is this JS variable, persisted to localStorage; the
  // toggle buttons and the release-list container's class are just a
  // rendering of it, re-derived on every renderViewToggle()/renderList().
  let viewMode = localStorage.getItem('musicTrackerViewMode') === 'list' ? 'list' : 'grid';

  function setViewMode(mode){
    if(mode !== 'grid' && mode !== 'list') return;
    viewMode = mode;
    localStorage.setItem('musicTrackerViewMode', mode);
    renderViewToggle();
    renderList();
  }

  function renderViewToggle(){
    document.querySelectorAll('.view-toggle-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.mode === viewMode);
    });
  }

  // ---- v14: modal accessibility — focus trap + Escape-to-close ----
  // Shared by all three overlay modals (release detail, artwork editor,
  // genre gallery). renderModal() replaces #modalSlot's innerHTML wholesale
  // on every state change (mark listened, overflow menu, etc.), so a
  // listener attached to a specific modal node wouldn't survive a re-render
  // — this single delegated listener re-queries the live DOM on every
  // keypress instead. Checked highest z-index first, since artwork modal
  // (z-index 300) can open on top of the release modal (150), which sits
  // above the genre gallery (140).
  let modalFocusReturnEl = null;
  function activeModalOverlay(){
    return document.getElementById('artworkModalOverlay')
      || document.querySelector('#modalSlot .modal-overlay')
      || document.getElementById('genreGalleryOverlay');
  }
  function focusableIn(el){
    return Array.from(el.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])'))
      .filter(n => !n.disabled && n.offsetParent !== null);
  }
  function closeActiveModal(overlay){
    if(overlay.id === 'artworkModalOverlay') closeArtworkModal();
    else if(overlay.id === 'genreGalleryOverlay') closeGenreGallery();
    else closeReleaseModal();
  }
  document.addEventListener('keydown', function(e){
    const overlay = activeModalOverlay();
    if(!overlay) return;
    if(e.key === 'Escape'){
      e.preventDefault();
      closeActiveModal(overlay);
      return;
    }
    if(e.key !== 'Tab') return;
    const items = focusableIn(overlay);
    if(!items.length) return;
    const first = items[0], last = items[items.length - 1];
    if(e.shiftKey && document.activeElement === first){
      e.preventDefault(); last.focus();
    } else if(!e.shiftKey && document.activeElement === last){
      e.preventDefault(); first.focus();
    }
  });
  // v17: global keyboard shortcuts — "/" jumps into search, "a" opens the
  // add form. Ignored while typing in any input/textarea/select so normal
  // typing isn't hijacked.
  document.addEventListener('keydown', function(e){
    const tag = (document.activeElement && document.activeElement.tagName) || '';
    if(['INPUT', 'TEXTAREA', 'SELECT'].includes(tag)) return;
    if(e.key === '/'){
      e.preventDefault();
      document.getElementById('searchInput').focus();
    } else if(e.key === 'a'){
      e.preventDefault();
      startFirstAdd();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  });

  function focusModal(overlay){
    modalFocusReturnEl = document.activeElement;
    const items = focusableIn(overlay);
    if(items.length) items[0].focus();
  }
  function restoreModalFocus(){
    if(modalFocusReturnEl && document.body.contains(modalFocusReturnEl) && modalFocusReturnEl.focus){
      modalFocusReturnEl.focus();
    }
    modalFocusReturnEl = null;
  }

  // v17: URL-addressable modal — pushes/clears a #release/{id} hash around
  // the existing open/close so the detail view is deep-linkable, survives a
  // refresh, and closes on browser Back. Doesn't touch the focus-trap logic.
  function openReleaseModal(id){
    openModalId = id;
    renderModal();
    history.pushState(null, '', '#release/' + id);
    const overlay = document.querySelector('#modalSlot .modal-overlay');
    if(overlay) focusModal(overlay);
  }
  function closeReleaseModal(){
    openModalId = null;
    renderModal();
    if(location.hash.startsWith('#release/')){
      history.pushState(null, '', location.pathname + location.search);
    }
    restoreModalFocus();
  }
  window.addEventListener('popstate', function(){
    const m = location.hash.match(/^#release\/(.+)$/);
    if(m && releases.find(r => r.id === m[1])){
      openModalId = m[1];
      renderModal();
    } else if(openModalId){
      openModalId = null;
      renderModal();
    }
  });
  function renderModal(){
    const slot = document.getElementById('modalSlot');
    if(!openModalId){ slot.innerHTML = ''; return; }
    const r = releases.find(x => x.id === openModalId);
    if(!r){ openModalId = null; slot.innerHTML = ''; return; }
    slot.innerHTML = `
      <div class="modal-overlay" onclick="if(event.target===this) closeReleaseModal()">
        <div class="modal-shell">
          <button class="modal-close" onclick="closeReleaseModal()" title="Close" aria-label="Close">✕</button>
          <div class="modal-box">
            ${renderCardMarkup(r)}
          </div>
        </div>
      </div>
    `;
    positionOverflowMenu(); // v19
  }

  // ---- v9: Spotify link per release ----
  // Exact album link when we have one (captured via the Spotify-assisted
  // add into the "Spotify URL" field); otherwise a best-effort Spotify
  // search for artist + title, so every release gets a working link.
  function spotifyLinkHtml(r){
    if(r.spotifyUrl){
      return `<a class="spotify-badge" href="${esc(r.spotifyUrl)}" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="Open album in Spotify">◉ Spotify ↗</a>`;
    }
    const q = `${r.artist || ''} ${r.title || ''}`.trim();
    if(!q) return '';
    return `<a class="spotify-badge search" href="https://open.spotify.com/search/${encodeURIComponent(q)}" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="Search for this on Spotify">⌕ Spotify</a>`;
  }

  // Full card markup (rating, tags, notes, listened toggle, edit/•••remove
  // menu) — used inside the detail modal. Grid tiles render a stripped-down
  // version of this same release in renderList() below.
  function renderCardMarkup(r){
    const status = releaseStatus(r);
    const badge = releaseStatusBadge(status);
    const tags = [
      r.year ? `<span class="meta-tag">${esc(formatReleaseDateDisplay(r.year))}</span>` : '',
      r.format ? `<span class="meta-tag format">${r.format}</span>` : '',
      r.genre ? r.genre.split(',').map(g => `<span class="meta-tag">${g.trim()}</span>`).join('') : '',
      spotifyLinkHtml(r), // v9: clickable Spotify link replaces the static badge
    ].filter(Boolean).join('');

    return `
      <div class="release-card status-${status}" id="card-${r.id}">
        <div class="card-top">
          ${coverHtml(r, 'card')}
          <div class="card-main">
            <div>
              <span class="card-artist">${esc(r.artist)}</span>
              ${r.title ? `<span class="card-title">— ${esc(r.title)}</span>` : ''}
            </div>
            ${tags ? `<div class="card-meta">${tags}</div>` : ''}
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0">
            <div class="card-rating-row">
              <div class="card-rating interactive">${interactiveRatingDots(r.id, r.rating)}</div>
              <span class="rating-num">${r.rating || 0}/5</span>
            </div>
            <span class="card-listened-badge ${badge.cls}">${badge.text}</span>
            <button class="revisit-btn" onclick="addRevisit('${r.id}')" title="Log a revisit" aria-label="Log a revisit">↺ ${r.revisits || 0}</button>
          </div>
        </div>
        ${r.notes ? `<div class="card-notes">${esc(r.notes)}</div>` : ''}
        <div class="card-actions">
          <button class="btn-action toggle-listened${r.listened ? ' active' : ''}" onclick="toggleListened('${r.id}')">${r.listened ? '✓ Listened' : 'Mark Listened'}</button>
          <button class="btn-overflow" onclick="toggleOverflowMenu('${r.id}')" title="More actions" aria-label="More actions">•••</button>
          <div class="overflow-menu ${openOverflowId === r.id ? 'open' : ''}">
            <button onclick="editRelease('${r.id}')">✎ Edit</button>
            <button onclick="openArtworkModal('${r.id}')">🖼 Artwork</button>
            <button class="danger-item ${pendingRemoveId === r.id ? 'confirming' : ''}" onclick="requestDeleteRelease('${r.id}')">
              ${pendingRemoveId === r.id ? 'Confirm remove?' : '✕ Remove'}
            </button>
          </div>
        </div>
      </div>`;
  }

  // v17: compact rating-dot row for the grid tile scrim, sized for the
  // tile footprint (not a reuse of .card-dot, which is styled for full-size
  // cards).
  // v19: numeric "4/5" readout alongside the dots — dots alone only show
  // relative fill, not the actual value at a glance.
  function tileRatingHtml(rating){
    if(!rating) return '';
    let html = '<div class="tile-rating">';
    for(let i = 1; i <= 5; i++) html += `<div class="tile-dot${i <= rating ? ' filled' : ''}"></div>`;
    html += `<span class="tile-rating-num">${rating}/5</span>`;
    return html + '</div>';
  }

  // v8: grid tile — artwork background, bottom scrim, corner status dot.
  // v17: scrim also surfaces rating + first genre tag, previously only
  // visible after opening the detail modal.
  function renderGridTile(r){
    const status = releaseStatus(r);
    const firstGenre = r.genre ? r.genre.split(',')[0].trim() : '';
    return `
      <div class="release-tile" tabindex="0" role="button" aria-label="Open ${esc(r.artist)}${r.title ? ' — ' + esc(r.title) : ''}" onclick="openReleaseModal('${r.id}')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openReleaseModal('${r.id}');}">
        ${coverHtml(r, 'tile')}
        <div class="tile-status-dot status-${status}"></div>
        <div class="tile-scrim">
          <div class="tile-text">
            <div class="tile-artist">${esc(r.artist)}</div>
            ${r.title ? `<div class="tile-title">${esc(r.title)}</div>` : ''}
          </div>
          ${tileRatingHtml(r.rating)}
          ${firstGenre ? `<span class="tile-genre">${esc(firstGenre)}</span>` : ''}
        </div>
      </div>`;
  }

  // v8: compact list row — status dot + artist/title only, no cover.
  // v19: bring rating + first genre into the row too, so list view doesn't
  // drop metadata that grid view shows on the tile scrim.
  function renderListRow(r){
    const status = releaseStatus(r);
    const firstGenre = r.genre ? r.genre.split(',')[0].trim() : '';
    return `
      <div class="release-row" tabindex="0" role="button" aria-label="Open ${esc(r.artist)}${r.title ? ' — ' + esc(r.title) : ''}" onclick="openReleaseModal('${r.id}')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openReleaseModal('${r.id}');}">
        <div class="release-row-dot status-${status}"></div>
        <div class="release-row-text">
          <span class="release-row-artist">${esc(r.artist)}</span>
          ${r.title ? `<span class="release-row-title">${esc(r.title)}</span>` : ''}
        </div>
        <div class="release-row-meta">
          ${firstGenre ? `<span class="release-row-genre">${esc(firstGenre)}</span>` : ''}
          ${r.rating ? `<div class="release-row-rating">${ratingDots(r.rating)}<span class="rating-num">${r.rating}/5</span></div>` : ''}
        </div>
      </div>`;
  }

  // ---- v9: release-month section headers ----
  // Buckets a release by the month of its parsed Release Date. Legacy
  // bare-year records normalize to 01/01, so they land in January of that
  // year — consistent with how sorting and display already treat them.
  const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  function releaseMonthGroup(r){
    const d = parseReleaseDate(r.year);
    if(!d) return { key: 'none', label: 'No release date', order: -1 };
    const y = d.getFullYear(), m = d.getMonth() + 1;
    return { key: `${y}-${String(m).padStart(2, '0')}`, label: `${MONTH_NAMES[m - 1]} ${y}`, order: y * 100 + m };
  }

  function renderList() {
    const list = getFiltered();
    const container = document.getElementById('releaseList');
    container.className = 'release-list' + (viewMode === 'list' ? ' view-list' : '');

    if (list.length === 0) {
      // v17: the truly-empty case (no releases at all, not just filtered
      // down to nothing) becomes an actual entry point instead of a dead end.
      container.innerHTML = releases.length === 0
        ? `<div class="empty-state">
             <div class="empty-state-icon">🎵</div>
             <p>No releases yet.</p>
             <button class="btn-primary" onclick="startFirstAdd()">+ Add your first release</button>
           </div>`
        : `<div class="empty-state"><p>No matches.</p></div>`;
      renderModal();
      return;
    }

    // v9: group into release-month sections. The active sort still applies
    // within each section (items keep getFiltered()'s order); sections run
    // newest-first, except on Release Date ↑ where they run oldest-first to
    // match. "No release date" always sits at the bottom.
    const sort = document.getElementById('sortBy').value;
    const groups = new Map();
    list.forEach(r => {
      const g = releaseMonthGroup(r);
      if(!groups.has(g.key)) groups.set(g.key, { key: g.key, label: g.label, order: g.order, items: [] });
      groups.get(g.key).items.push(r);
    });
    const ordered = [...groups.values()].sort((a, b) => {
      if(a.key === 'none') return 1;
      if(b.key === 'none') return -1;
      return sort === 'year-asc' ? a.order - b.order : b.order - a.order;
    });

    const itemHtml = r => viewMode === 'list' ? renderListRow(r) : renderGridTile(r);
    container.innerHTML = ordered.map(g =>
      `<div class="month-header"><span>${esc(g.label)}</span><span class="month-count">${g.items.length}</span></div>`
      + g.items.map(itemHtml).join('')
    ).join('');
    renderModal();
  }

  // ── Stats ──────────────────────────────────────────
  function renderStats() {
    if (releases.length === 0) {
      document.getElementById('statsGrid').innerHTML = '<p style="color:var(--text-dim);font-family:var(--font-display);font-size:13px;">No data yet.</p>';
      document.getElementById('statsExtra').innerHTML = '';
      return;
    }

    const total = releases.length;
    const listened = releases.filter(r => r.listened).length;
    const rated = releases.filter(r => r.rating > 0);
    const avgRating = rated.length ? (rated.reduce((s, r) => s + r.rating, 0) / rated.length).toFixed(1) : '—';
    const pct = total ? Math.round((listened / total) * 100) : 0;

    document.getElementById('statsGrid').innerHTML = `
      <div class="stats-card"><div class="big-num">0</div><div class="big-label">Releases Logged</div></div>
      <div class="stats-card"><div class="big-num">0</div><div class="big-label">Listened</div></div>
      <div class="stats-card"><div class="big-num">0</div><div class="big-label">To Listen</div></div>
      <div class="stats-card"><div class="big-num">0%</div><div class="big-label">Coverage</div></div>
      <div class="stats-card"><div class="big-num">${avgRating}</div><div class="big-label">Avg Rating</div></div>
    `;
    const bigNums = document.querySelectorAll('#statsGrid .big-num');
    animateCountUp(bigNums[0], total);
    animateCountUp(bigNums[1], listened);
    animateCountUp(bigNums[2], total - listened);
    animateCountUp(bigNums[3], pct, '%');

    // Top rated
    const topRated = [...releases].filter(r => r.rating > 0).sort((a, b) => b.rating - a.rating).slice(0, 5);
    const topRatedHtml = topRated.length ? topRated.map((r, i) => `
      <div class="top-item">
        <span class="rank">${i + 1}</span>
        <span class="name">${esc(r.artist)}${r.title ? ` — ${esc(r.title)}` : ''}</span>
        <span class="score">${'▪'.repeat(r.rating)}${'·'.repeat(5 - r.rating)}</span>
      </div>`).join('') : '<p style="color:var(--text-dim);font-size:12px;">No rated releases yet.</p>';

    // Genre breakdown
    const genreCounts = {};
    releases.forEach(r => {
      if (r.genre) {
        r.genre.split(',').forEach(g => {
          const tag = g.trim().toLowerCase();
          if (tag) genreCounts[tag] = (genreCounts[tag] || 0) + 1;
        });
      }
    });
    // v12: pill cloud instead of static bars — each pill's size/opacity scales
    // with its share of the top genre, and clicking one opens a gallery of
    // matching releases (see openGenreGallery below).
    const sortedGenres = Object.entries(genreCounts).sort((a, b) => b[1] - a[1]).slice(0, 8);
    const maxG = sortedGenres[0]?.[1] || 1;
    const genreHtml = sortedGenres.length ? `
      <div class="genre-pills">
        ${sortedGenres.map(([g, c]) => {
          const weight = c / maxG;
          const fontSize = (11 + weight * 7).toFixed(1);
          const opacity = (0.6 + weight * 0.4).toFixed(2);
          return `<button type="button" class="genre-pill" style="font-size:${fontSize}px;opacity:${opacity}" data-genre="${esc(g)}" onclick="openGenreGallery(this.dataset.genre)">${esc(g)}<span class="genre-pill-count">${c}</span></button>`;
        }).join('')}
      </div>` : '<p style="color:var(--text-dim);font-size:12px;">No genre data.</p>';

    // Format breakdown
    const formatCounts = {};
    releases.forEach(r => { if (r.format) formatCounts[r.format] = (formatCounts[r.format] || 0) + 1; });
    const formatHtml = Object.entries(formatCounts).sort((a,b) => b[1]-a[1]).map(([f, c]) => `
      <div class="top-item">
        <span class="name">${esc(f)}</span>
        <span class="score">${c} release${c > 1 ? 's' : ''}</span>
      </div>`).join('') || '<p style="color:var(--text-dim);font-size:12px;">No format data.</p>';

    // v17: time dimension — releases logged per month, trailing 12 months,
    // zero-filled so gaps are visible rather than skipped.
    const monthBuckets = monthlyAddedCounts(releases);
    const maxMonthCount = Math.max(1, ...monthBuckets.map(b => b.count));
    const monthlyHtml = `
      <div class="month-bars">
        ${monthBuckets.map(b => `
          <div class="month-bar-row">
            <span class="month-bar-label">${MONTH_NAMES[b.month].slice(0, 3)} '${String(b.year).slice(2)}</span>
            <div class="month-bar-track"><div class="month-bar-fill" style="width:${(b.count / maxMonthCount * 100).toFixed(0)}%"></div></div>
            <span class="month-bar-count">${b.count}</span>
          </div>
        `).join('')}
      </div>`;

    document.getElementById('statsExtra').innerHTML = `
      <div class="stats-section-title">Top Rated</div>
      <div class="top-list">${topRatedHtml}</div>
      <div class="stats-section-title">Genre Breakdown</div>
      ${genreHtml}
      <div class="stats-section-title">By Format</div>
      <div class="top-list">${formatHtml}</div>
      <div class="stats-section-title">Logged per Month</div>
      ${monthlyHtml}
    `;
  }

  // v12: click-to-filter gallery for a genre pill — imperative overlay
  // (same append/remove pattern as openArtworkModal), reusing renderGridTile
  // and the .release-list grid so it looks like the main tile view.
  function openGenreGallery(tag){
    const matches = releases.filter(r => r.genre && r.genre.split(',').some(g => g.trim().toLowerCase() === tag));
    if(!matches.length) return;

    const overlay = document.createElement('div');
    overlay.id = 'genreGalleryOverlay';
    overlay.className = 'genre-gallery-overlay';
    overlay.onclick = (e) => { if(e.target === overlay) closeGenreGallery(); };

    const shell = document.createElement('div');
    shell.className = 'genre-gallery-shell';

    const box = document.createElement('div');
    box.className = 'genre-gallery-box';
    box.innerHTML = `
      <div class="genre-gallery-header">
        <span class="genre-gallery-title">${esc(tag)}</span>
        <span class="genre-gallery-count">${matches.length} release${matches.length > 1 ? 's' : ''}</span>
      </div>
      <div class="release-list">${matches.map(renderGridTile).join('')}</div>
    `;
    shell.innerHTML = `<button class="modal-close" onclick="closeGenreGallery()" title="Close" aria-label="Close">✕</button>`;
    shell.appendChild(box);
    overlay.appendChild(shell);
    document.body.appendChild(overlay);
    focusModal(overlay);
  }

  function closeGenreGallery(){
    const overlay = document.getElementById('genreGalleryOverlay');
    if(overlay) document.body.removeChild(overlay);
    restoreModalFocus();
  }

  // v17: animates an element's text from 0 to a whole-number target over
  // ~500ms; jumps straight to the final value when the visitor prefers
  // reduced motion. `suffix` (e.g. '%') is appended after every frame,
  // including the final one.
  function animateCountUp(el, target, suffix = ''){
    if(!el) return;
    // Also skip straight to the final value when the tab is backgrounded —
    // requestAnimationFrame is paused for hidden tabs, so a render that
    // happens while hidden would otherwise leave the placeholder "0"
    // stuck indefinitely instead of ever reaching the real number.
    if(document.hidden || !matchMedia('(prefers-reduced-motion: no-preference)').matches){
      el.textContent = target + suffix;
      return;
    }
    const duration = 500, startTime = performance.now();
    function tick(now){
      const p = Math.min((now - startTime) / duration, 1);
      el.textContent = Math.round(target * p) + suffix;
      if(p < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  // ── Header Stats ───────────────────────────────────
  function updateHeaderStats() {
    const total = releases.length;
    const listened = releases.filter(r => r.listened).length;
    const rated = releases.filter(r => r.rating > 0);
    const avgRating = rated.length ? (rated.reduce((s, r) => s + r.rating, 0) / rated.length).toFixed(1) : '—';
    document.getElementById('headerStats').innerHTML = `
      <div class="stat-pill"><div class="num">0</div><div class="lbl">Logged</div></div>
      <div class="stat-pill"><div class="num">0</div><div class="lbl">Listened</div></div>
      <div class="stat-pill"><div class="num">${avgRating}</div><div class="lbl">Avg Rating</div></div>
    `;
    const nums = document.querySelectorAll('#headerStats .num');
    animateCountUp(nums[0], total);
    animateCountUp(nums[1], listened);
  }

  // ── Tabs ───────────────────────────────────────────
  function showTab(tab) {
    document.getElementById('tabLog').style.display = tab === 'log' ? '' : 'none';
    document.getElementById('tabStats').style.display = tab === 'stats' ? '' : 'none';
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', (i === 0 && tab === 'log') || (i === 1 && tab === 'stats'));
    });
    if (tab === 'stats') renderStats();
  }

  // ── Toast ──────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
  }

  // ── Revisit ───────────────────────────────────────
  async function addRevisit(id) {
    const r = releases.find(x => x.id === id);
    if (!r) return;
    const newRevisits = (r.revisits || 0) + 1;
    const newUpdatedAt = Date.now();
    try {
      await airtableRequest(API_URL, {
        method: 'PATCH',
        body: JSON.stringify({ records: [{ id, fields: { 'Revisits': newRevisits, 'Updated At': newUpdatedAt } }] })
      });
      r.revisits = newRevisits;
      r.updatedAt = newUpdatedAt;
    } catch (e) {
      console.error('Revisit update failed:', e);
      showToast('Could not log revisit — check your connection and try again.');
      return;
    }
    renderList();
    showToast('Revisit logged.');
  }

  // ── Util ───────────────────────────────────────────
  function esc(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Finds an existing release with the same artist + title (case-insensitive,
  // trimmed). Returns the matching release, or null if none found.
