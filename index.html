  function findDuplicate(artist, title, excludeId) {
    const a = (artist || '').trim().toLowerCase();
    const t = (title || '').trim().toLowerCase();
    if (!a && !t) return null;
    return releases.find(r =>
      r.id !== excludeId &&
      (r.artist || '').trim().toLowerCase() === a &&
      (r.title || '').trim().toLowerCase() === t
    ) || null;
  }

  // ── Export ─────────────────────────────────────────
  function exportData() {
    const json = JSON.stringify(releases, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const d = new Date();
    a.download = `music-tracker-backup-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('Backup downloaded.');
  }

  function importData() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json,application/json';
    input.onchange = e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async ev => {
        try {
          const parsed = JSON.parse(ev.target.result);
          if (!Array.isArray(parsed)) throw new Error('Invalid format');

          const dupeCount = parsed.filter(r => findDuplicate(r.artist, r.title)).length;
          const baseMsg = `Import ${parsed.length} release(s)? These will be added as new entries alongside your existing collection.`;
          const dupeMsg = dupeCount > 0
            ? `\n\nHeads up: ${dupeCount} of these look like they might already be in your collection (matched by artist + title) — they'll still be added as new entries, not merged.`
            : '';
          const confirmed = await showConfirmDialog(baseMsg + dupeMsg, 'Import');
          if (!confirmed) return;

          // Airtable allows max 10 records per write — batch it.
          let imported = 0;
          for (let i = 0; i < parsed.length; i += 10) {
            const chunk = parsed.slice(i, i + 10);
            const records = chunk.map(r => ({ fields: releaseToFields(r) }));
            const data = await airtableRequest(API_URL, {
              method: 'POST',
              body: JSON.stringify({ records })
            });
            data.records.forEach(rec => releases.unshift(recordToRelease(rec)));
            imported += chunk.length;
          }

          renderGenreFilters();
          renderFriday();
          renderHero();
          renderList();
          updateHeaderStats();
          showToast(`Imported ${imported} release(s).`);
        } catch(err) {
          console.error('Import failed:', err);
          showToast('Import failed – invalid file or connection issue.');
        }
      };
      reader.readAsText(file);
    };
    input.click();
  }

  // v13: module scripts don't leak top-level declarations onto `window`,
  // but the markup above (including template strings rendered into
  // innerHTML) calls these by name from inline onclick/onchange/oninput
  // attributes, which resolve identifiers against the global object —
  // so anything invoked that way has to be attached here explicitly.
  Object.assign(window, {
    addRevisit, applySpotifyResult, cancelEdit, clearFilterChip, clearForm, closeGenreGallery,
    closeReleaseModal, editRelease, exportData, hideOfflineBanner, importData,
    openArtworkModal, openGenreGallery, openReleaseModal, renderList,
    requestDeleteRelease, saveRelease, setFormRating, setViewMode, showTab, spotifySearch,
    startFirstAdd, surpriseMe, toggleAddForm, toggleFilterPanel, toggleListened, toggleOverflowMenu,
    updateFilterSummary, updateRatingInline,
  });

  // ── Init ───────────────────────────────────────────
  renderViewToggle();
  loadReleases();

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js').catch(() => {});
    });
  }
</script>
</body>
</html>
