<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface-2: #1e1e1e;
    --border: #2a2a2a;
    --border-hover: #444444;
    --text: #f0ede8;
    --text-muted: #b0ada8;
    --text-dim: #747170;
    --gold: #c9a84c;
    --gold-dim: #9a7a38;
    --green: #6aaa7a;
    --red: #aa6a6a;
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'Inter', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--border);
    padding: 24px 24px 20px;
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  header h1 {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  header span {
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 400;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .header-stats {
    margin-left: auto;
    display: flex;
    gap: 24px;
    align-items: center;
  }

  .stat-pill {
    text-align: right;
  }

  .stat-pill .num {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 600;
    color: var(--gold);
    line-height: 1;
  }

  .stat-pill .lbl {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* TABS */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }

  .tab-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 14px 0;
    margin-right: 28px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.15s, border-color 0.15s;
  }

  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

  /* MAIN LAYOUT */
  .main {
    max-width: 860px;
    margin: 0 auto;
    padding: 28px 24px;
  }

  /* ADD FORM */
  .add-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px;
    margin-bottom: 28px;
  }

  .form-title {
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  .form-row {
    display: grid;
    gap: 10px;
    margin-bottom: 10px;
  }

  .form-row.two { grid-template-columns: 1fr 1fr; }
  .form-row.three { grid-template-columns: 2fr 1fr 1fr; }

  label {
    font-family: var(--font-display);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    display: block;
    margin-bottom: 5px;
  }

  input[type="text"],
  input[type="number"],
  select,
  textarea {
    width: 100%;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 13px;
    padding: 9px 11px;
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }

  input[type="text"]:focus,
  input[type="number"]:focus,
  select:focus,
  textarea:focus {
    border-color: var(--gold-dim);
  }

  input::placeholder, textarea::placeholder { color: var(--text-dim); }

  textarea {
    resize: vertical;
    min-height: 68px;
    line-height: 1.5;
  }

  select option { background: var(--surface-2); }

  /* RATING INPUT */
  .rating-field { }
  .rating-blocks {
    display: flex;
    gap: 4px;
    margin-top: 2px;
  }

  .rating-block {
    width: 22px;
    height: 22px;
    border: 1px solid var(--border);
    background: var(--surface-2);
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.1s, border-color 0.1s;
  }

  .rating-block.filled {
    background: var(--gold);
    border-color: var(--gold);
  }

  .rating-block:hover { border-color: var(--gold-dim); }

  /* LISTENED CHECKBOX */
  .check-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 6px;
  }

  .check-row input[type="checkbox"] {
    width: 16px;
    height: 16px;
    accent-color: var(--green);
    cursor: pointer;
  }

  .check-row label {
    margin: 0;
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
    text-transform: none;
    letter-spacing: 0;
    font-weight: 400;
  }

  /* BUTTONS */
  .btn-row {
    display: flex;
    gap: 8px;
    margin-top: 14px;
  }

  .btn-primary {
    background: var(--gold);
    border: none;
    border-radius: 3px;
    color: #0d0d0d;
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 9px 20px;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .btn-primary:hover { opacity: 0.85; }

  .btn-ghost {
    background: none;
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text-muted);
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 500;
    padding: 9px 16px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }

  .btn-ghost:hover { border-color: var(--border-hover); color: var(--text); }

  /* FILTERS */
  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-bar input[type="text"] {
    flex: 1;
    min-width: 160px;
    max-width: 260px;
  }

  .filter-bar select { max-width: 130px; }

  .filter-label {
    font-family: var(--font-display);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* RELEASE CARDS */
  .release-list { display: flex; flex-direction: column; gap: 1px; }

  .release-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px 18px;
    transition: border-color 0.15s;
    position: relative;
  }

  .release-card:hover { border-color: var(--border-hover); }
  .release-card.listened { border-left: 2px solid var(--green); }
  .release-card.unlistened { border-left: 2px solid var(--border); }

  .card-top {
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }

  .card-main { flex: 1; min-width: 0; }

  .card-artist {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }

  .card-title {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 400;
    color: var(--text-muted);
    margin-left: 6px;
  }

  .card-meta {
    display: flex;
    gap: 8px;
    margin-top: 4px;
    flex-wrap: wrap;
  }

  .meta-tag {
    font-size: 10px;
    font-family: var(--font-display);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--text-dim);
    background: var(--surface-2);
    padding: 2px 7px;
    border-radius: 2px;
  }

  .meta-tag.format { color: var(--gold-dim); }

  .card-rating {
    display: flex;
    gap: 3px;
    flex-shrink: 0;
    align-items: flex-start;
    padding-top: 2px;
  }

  .card-dot {
    width: 8px;
    height: 8px;
    border-radius: 1px;
    background: var(--border);
  }

  .card-dot.filled { background: var(--gold); }

  .card-listened-badge {
    font-size: 9px;
    font-family: var(--font-display);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .badge-yes { background: rgba(90,138,106,0.15); color: var(--green); }
  .badge-no { background: var(--surface-2); color: var(--text-dim); }

  .card-notes {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
    font-style: italic;
  }

  .card-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }

  .btn-action {
    background: none;
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text-muted);
    font-family: var(--font-display);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 5px 11px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-action:hover { border-color: var(--border-hover); color: var(--text); }
  .btn-action.danger:hover { border-color: var(--red); color: #c47272; }
  .btn-action.toggle-listened.active { border-color: var(--green); color: var(--green); }

  /* WAVEFORM DIVIDER */
  .wave-divider {
    display: flex;
    align-items: center;
    gap: 3px;
    padding: 10px 0;
  }

  .wave-bar {
    width: 2px;
    background: var(--border);
    border-radius: 1px;
    animation: none;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
  }

  .empty-state p {
    font-family: var(--font-display);
    color: var(--text-dim);
    font-size: 13px;
  }

  /* STATS PAGE */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
  }

  .stats-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 18px 20px;
  }

  .stats-card .big-num {
    font-family: var(--font-display);
    font-size: 36px;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
    margin-bottom: 4px;
  }

  .stats-card .big-label {
    font-family: var(--font-display);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .stats-section-title {
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
    margin-top: 24px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .top-list { display: flex; flex-direction: column; gap: 8px; }

  .top-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
  }

  .top-item .rank {
    font-family: var(--font-display);
    font-size: 11px;
    color: var(--gold);
    font-weight: 700;
    width: 18px;
    flex-shrink: 0;
  }

  .top-item .name {
    flex: 1;
    font-family: var(--font-display);
    font-size: 13px;
    color: var(--text);
  }

  .top-item .score {
    font-family: var(--font-display);
    font-size: 12px;
    color: var(--text-muted);
  }

  .genre-bars { display: flex; flex-direction: column; gap: 6px; }

  .genre-bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .genre-bar-label {
    font-family: var(--font-display);
    font-size: 11px;
    color: var(--text-muted);
    width: 100px;
    flex-shrink: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .genre-bar-track {
    flex: 1;
    height: 6px;
    background: var(--surface-2);
    border-radius: 3px;
    overflow: hidden;
  }

  .genre-bar-fill {
    height: 100%;
    background: var(--gold);
    border-radius: 3px;
    transition: width 0.5s ease;
  }

  .genre-bar-count {
    font-family: var(--font-display);
    font-size: 11px;
    color: var(--text-dim);
    width: 20px;
    text-align: right;
    flex-shrink: 0;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface);
    border: 1px solid var(--gold-dim);
    border-radius: 3px;
    color: var(--text);
    font-family: var(--font-display);
    font-size: 12px;
    padding: 10px 16px;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.2s;
    pointer-events: none;
    z-index: 100;
  }

  .toast.show { opacity: 1; transform: translateY(0); }

  /* EDIT MODE */
  .release-card.editing { border-color: var(--gold-dim); }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .form-row.two, .form-row.three { grid-template-columns: 1fr; }
    .header-stats { display: none; }
    .filter-bar { gap: 6px; }
    .filter-bar input[type="text"] { max-width: 100%; }
  }
</style>
</head>
<body>

<header>
  <h1>Music Tracker</h1>
  <span>Release Log</span>
  <div class="header-stats" id="headerStats"></div>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('log')">Log</button>
  <button class="tab-btn" onclick="showTab('stats')">Stats</button>
</div>

<div class="main">

  <!-- LOG TAB -->
  <div id="tabLog">

    <div class="add-form">
      <div class="form-title" id="formLabel">Add Release</div>

      <div class="form-row two">
        <div>
          <label for="fArtist">Artist</label>
          <input type="text" id="fArtist" placeholder="Artist / Band">
        </div>
        <div>
          <label for="fTitle">Title</label>
          <input type="text" id="fTitle" placeholder="Album / EP / Single">
        </div>
      </div>

      <div class="form-row three">
        <div>
          <label for="fGenre">Genre / Tag</label>
          <input type="text" id="fGenre" placeholder="e.g. ambient, drone, metal">
        </div>
        <div>
          <label for="fYear">Release Date</label>
          <input type="text" id="fYear" placeholder="dd/mm/yyyy" maxlength="10">
        </div>
        <div>
          <label for="fFormat">Format</label>
          <select id="fFormat">
            <option value="">– format –</option>
            <option>LP</option>
            <option>EP</option>
            <option>Single</option>
            <option>Compilation</option>
            <option>Mixtape</option>
            <option>Demo</option>
            <option>Other</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div>
          <label>Rating</label>
          <div class="rating-blocks" id="formRating">
            <div class="rating-block" onclick="setFormRating(1)"></div>
            <div class="rating-block" onclick="setFormRating(2)"></div>
            <div class="rating-block" onclick="setFormRating(3)"></div>
            <div class="rating-block" onclick="setFormRating(4)"></div>
            <div class="rating-block" onclick="setFormRating(5)"></div>
          </div>
        </div>
      </div>

      <div class="form-row">
        <div>
          <label for="fNotes">Notes</label>
          <textarea id="fNotes" placeholder="First impressions, standout tracks, context…"></textarea>
        </div>
      </div>

      <div class="check-row">
        <input type="checkbox" id="fListened">
        <label for="fListened">Marked as listened</label>
      </div>

      <div class="btn-row">
        <button class="btn-primary" onclick="saveRelease()">Save Release</button>
        <button class="btn-ghost" id="cancelBtn" onclick="cancelEdit()" style="display:none">Cancel</button>
        <button class="btn-ghost" onclick="clearForm()">Clear</button>
      </div>
    </div>

    <!-- FILTERS -->
    <div class="filter-bar">
      <span class="filter-label">Filter:</span>
      <input type="text" id="searchInput" placeholder="Artist or title…" oninput="renderList()">
      <select id="filterListened" onchange="renderList()">
        <option value="">All</option>
        <option value="yes">Listened</option>
        <option value="no">To Listen</option>
      </select>
      <select id="filterFormat" onchange="renderList()">
        <option value="">Any Format</option>
        <option>LP</option>
        <option>EP</option>
        <option>Single</option>
        <option>Compilation</option>
        <option>Mixtape</option>
        <option>Demo</option>
        <option>Other</option>
      </select>
      <select id="sortBy" onchange="renderList()">
        <option value="year-asc">Release Date ↑</option>
        <option value="added-desc">Newest Added</option>
        <option value="added-asc">Oldest Added</option>
        <option value="rating-desc">Highest Rated</option>
        <option value="artist-asc">Artist A–Z</option>
      </select>
    </div>

    <div style="display:flex;justify-content:flex-end;margin-bottom:12px;gap:6px;">
      <button class="btn-action" onclick="importData()" title="Import a backup JSON file">↑ Import</button>
      <button class="btn-action" onclick="exportData()" title="Download a backup JSON file">↓ Export</button>
    </div>
    <div class="release-list" id="releaseList"></div>
  </div>

  <!-- STATS TAB -->
  <div id="tabStats" style="display:none">
    <div class="stats-grid" id="statsGrid"></div>
    <div id="statsExtra"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  // ── State ──────────────────────────────────────────
  let releases = [];
  let formRating = 0;
  let editingId = null;
  const STORAGE_KEY = 'music-tracker-releases';

  // ── Storage ────────────────────────────────────────
  function loadReleases() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      releases = raw ? JSON.parse(raw) : [];
    } catch (e) {
      releases = [];
    }
    renderList();
    updateHeaderStats();
  }

  function saveReleases() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(releases));
    } catch (e) {
      console.error('Storage save failed:', e);
    }
  }

  // ── Form Rating ────────────────────────────────────
  function setFormRating(val) {
    // Toggle off if clicking same value
    formRating = (formRating === val) ? 0 : val;
    updateFormRatingUI();
  }

  function updateFormRatingUI() {
    const blocks = document.querySelectorAll('#formRating .rating-block');
    blocks.forEach((b, i) => {
      b.classList.toggle('filled', i < formRating);
    });
  }

  // ── Save / Edit ────────────────────────────────────
  function saveRelease() {
    const artist = document.getElementById('fArtist').value.trim();
    const title = document.getElementById('fTitle').value.trim();
    if (!artist && !title) { showToast('Add at least an artist or title.'); return; }

    const entry = {
      id: editingId || Date.now().toString(),
      artist,
      title,
      genre: document.getElementById('fGenre').value.trim(),
      year: document.getElementById('fYear').value.trim(),
      format: document.getElementById('fFormat').value,
      rating: formRating,
      notes: document.getElementById('fNotes').value.trim(),
      listened: document.getElementById('fListened').checked,
      addedAt: editingId ? (releases.find(r => r.id === editingId)?.addedAt || Date.now()) : Date.now(),
      updatedAt: Date.now(),
    };

    if (editingId) {
      const idx = releases.findIndex(r => r.id === editingId);
      if (idx !== -1) releases[idx] = entry;
      editingId = null;
    } else {
      releases.unshift(entry);
    }

    saveReleases();
    clearForm();
    renderList();
    updateHeaderStats();
    showToast(editingId ? 'Updated.' : 'Release saved.');
    document.getElementById('formLabel').textContent = 'Add Release';
    document.getElementById('cancelBtn').style.display = 'none';
  }

  function editRelease(id) {
    const r = releases.find(x => x.id === id);
    if (!r) return;
    editingId = id;
    document.getElementById('fArtist').value = r.artist;
    document.getElementById('fTitle').value = r.title;
    document.getElementById('fGenre').value = r.genre;
    document.getElementById('fYear').value = r.year;
    document.getElementById('fFormat').value = r.format;
    document.getElementById('fNotes').value = r.notes;
    document.getElementById('fListened').checked = r.listened;
    formRating = r.rating;
    updateFormRatingUI();
    document.getElementById('formLabel').textContent = 'Edit Release';
    document.getElementById('cancelBtn').style.display = '';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function cancelEdit() {
    editingId = null;
    clearForm();
    document.getElementById('formLabel').textContent = 'Add Release';
    document.getElementById('cancelBtn').style.display = 'none';
  }

  function clearForm() {
    ['fArtist','fTitle','fGenre','fYear','fNotes'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('fFormat').value = '';
    document.getElementById('fListened').checked = false;
    formRating = 0;
    updateFormRatingUI();
  }

  function deleteRelease(id) {
    if (!confirm('Remove this release?')) return;
    releases = releases.filter(r => r.id !== id);
    saveReleases();
    renderList();
    updateHeaderStats();
    showToast('Removed.');
  }

  function toggleListened(id) {
    const r = releases.find(x => x.id === id);
    if (!r) return;
    r.listened = !r.listened;
    r.updatedAt = Date.now();
    saveReleases();
    renderList();
    updateHeaderStats();
  }

  // ── Render ─────────────────────────────────────────
  function getFiltered() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const fl = document.getElementById('filterListened').value;
    const ff = document.getElementById('filterFormat').value;
    const sort = document.getElementById('sortBy').value;

    let list = releases.filter(r => {
      if (q && !r.artist.toLowerCase().includes(q) && !r.title.toLowerCase().includes(q) && !r.genre.toLowerCase().includes(q)) return false;
      if (fl === 'yes' && !r.listened) return false;
      if (fl === 'no' && r.listened) return false;
      if (ff && r.format !== ff) return false;
      return true;
    });

    list.sort((a, b) => {
      if (sort === 'added-desc') return b.addedAt - a.addedAt;
      if (sort === 'added-asc') return a.addedAt - b.addedAt;
      if (sort === 'rating-desc') return b.rating - a.rating;
      if (sort === 'artist-asc') return a.artist.localeCompare(b.artist);
      if (sort === 'year-desc' || sort === 'year-asc') {
        const parseDate = d => { if (!d) return 0; const p = d.split('/'); return p.length === 3 ? parseInt(p[2]+p[1]+p[0]) : parseInt(d); };
        return sort === 'year-asc' ? parseDate(b.year) - parseDate(a.year) : parseDate(a.year) - parseDate(b.year);
      }
      return 0;
    });

    return list;
  }

  function ratingDots(rating) {
    let html = '';
    for (let i = 1; i <= 5; i++) {
      html += `<div class="card-dot${i <= rating ? ' filled' : ''}"></div>`;
    }
    return html;
  }

  function renderList() {
    const list = getFiltered();
    const container = document.getElementById('releaseList');

    if (list.length === 0) {
      container.innerHTML = `<div class="empty-state"><p>${releases.length === 0 ? 'No releases yet. Add one above.' : 'No matches.'}</p></div>`;
      return;
    }

    container.innerHTML = list.map(r => {
      const tags = [
        r.year ? `<span class="meta-tag">${esc(r.year)}</span>` : '',
        r.format ? `<span class="meta-tag format">${r.format}</span>` : '',
        r.genre ? r.genre.split(',').map(g => `<span class="meta-tag">${g.trim()}</span>`).join('') : '',
      ].filter(Boolean).join('');

      return `
      <div class="release-card ${r.listened ? 'listened' : 'unlistened'}" id="card-${r.id}">
        <div class="card-top">
          <div class="card-main">
            <div>
              <span class="card-artist">${esc(r.artist)}</span>
              ${r.title ? `<span class="card-title">— ${esc(r.title)}</span>` : ''}
            </div>
            ${tags ? `<div class="card-meta">${tags}</div>` : ''}
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0">
            ${r.rating ? `<div class="card-rating">${ratingDots(r.rating)}</div>` : ''}
            <span class="card-listened-badge ${r.listened ? 'badge-yes' : 'badge-no'}">${r.listened ? 'Listened' : 'Not yet'}</span>
          </div>
        </div>
        ${r.notes ? `<div class="card-notes">${esc(r.notes)}</div>` : ''}
        <div class="card-actions">
          <button class="btn-action toggle-listened${r.listened ? ' active' : ''}" onclick="toggleListened('${r.id}')">${r.listened ? '✓ Listened' : 'Mark Listened'}</button>
          <button class="btn-action" onclick="editRelease('${r.id}')">Edit</button>
          <button class="btn-action danger" onclick="deleteRelease('${r.id}')">Remove</button>
        </div>
      </div>`;
    }).join('');
  }

  // ── Stats ──────────────────────────────────────────
  function renderStats() {
    if (releases.length === 0) {
      document.getElementById('statsGrid').innerHTML = '<p style="color:var(--text-dim);font-family:var(--font-display);font-size:13px;">No data yet.</p>';
      document.getElementById('statsExtra').innerHTML = '';
      return;
    }

    const total = releases.length;
    const listened = releases.filter(r => r.listened).length;
    const rated = releases.filter(r => r.rating > 0);
    const avgRating = rated.length ? (rated.reduce((s, r) => s + r.rating, 0) / rated.length).toFixed(1) : '—';
    const pct = total ? Math.round((listened / total) * 100) : 0;

    document.getElementById('statsGrid').innerHTML = `
      <div class="stats-card"><div class="big-num">${total}</div><div class="big-label">Releases Logged</div></div>
      <div class="stats-card"><div class="big-num">${listened}</div><div class="big-label">Listened</div></div>
      <div class="stats-card"><div class="big-num">${total - listened}</div><div class="big-label">To Listen</div></div>
      <div class="stats-card"><div class="big-num">${pct}%</div><div class="big-label">Coverage</div></div>
      <div class="stats-card"><div class="big-num">${avgRating}</div><div class="big-label">Avg Rating</div></div>
    `;

    // Top rated
    const topRated = [...releases].filter(r => r.rating > 0).sort((a, b) => b.rating - a.rating).slice(0, 5);
    const topRatedHtml = topRated.length ? topRated.map((r, i) => `
      <div class="top-item">
        <span class="rank">${i + 1}</span>
        <span class="name">${esc(r.artist)}${r.title ? ` — ${esc(r.title)}` : ''}</span>
        <span class="score">${'▪'.repeat(r.rating)}${'·'.repeat(5 - r.rating)}</span>
      </div>`).join('') : '<p style="color:var(--text-dim);font-size:12px;">No rated releases yet.</p>';

    // Genre breakdown
    const genreCounts = {};
    releases.forEach(r => {
      if (r.genre) {
        r.genre.split(',').forEach(g => {
          const tag = g.trim().toLowerCase();
          if (tag) genreCounts[tag] = (genreCounts[tag] || 0) + 1;
        });
      }
    });
    const sortedGenres = Object.entries(genreCounts).sort((a, b) => b[1] - a[1]).slice(0, 8);
    const maxG = sortedGenres[0]?.[1] || 1;
    const genreHtml = sortedGenres.length ? `
      <div class="genre-bars">
        ${sortedGenres.map(([g, c]) => `
        <div class="genre-bar-row">
          <span class="genre-bar-label">${esc(g)}</span>
          <div class="genre-bar-track"><div class="genre-bar-fill" style="width:${Math.round((c / maxG) * 100)}%"></div></div>
          <span class="genre-bar-count">${c}</span>
        </div>`).join('')}
      </div>` : '<p style="color:var(--text-dim);font-size:12px;">No genre data.</p>';

    // Format breakdown
    const formatCounts = {};
    releases.forEach(r => { if (r.format) formatCounts[r.format] = (formatCounts[r.format] || 0) + 1; });
    const formatHtml = Object.entries(formatCounts).sort((a,b) => b[1]-a[1]).map(([f, c]) => `
      <div class="top-item">
        <span class="name">${esc(f)}</span>
        <span class="score">${c} release${c > 1 ? 's' : ''}</span>
      </div>`).join('') || '<p style="color:var(--text-dim);font-size:12px;">No format data.</p>';

    document.getElementById('statsExtra').innerHTML = `
      <div class="stats-section-title">Top Rated</div>
      <div class="top-list">${topRatedHtml}</div>
      <div class="stats-section-title">Genre Breakdown</div>
      ${genreHtml}
      <div class="stats-section-title">By Format</div>
      <div class="top-list">${formatHtml}</div>
    `;
  }

  // ── Header Stats ───────────────────────────────────
  function updateHeaderStats() {
    const total = releases.length;
    const listened = releases.filter(r => r.listened).length;
    document.getElementById('headerStats').innerHTML = `
      <div class="stat-pill"><div class="num">${total}</div><div class="lbl">Logged</div></div>
      <div class="stat-pill"><div class="num">${listened}</div><div class="lbl">Heard</div></div>
    `;
  }

  // ── Tabs ───────────────────────────────────────────
  function showTab(tab) {
    document.getElementById('tabLog').style.display = tab === 'log' ? '' : 'none';
    document.getElementById('tabStats').style.display = tab === 'stats' ? '' : 'none';
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', (i === 0 && tab === 'log') || (i === 1 && tab === 'stats'));
    });
    if (tab === 'stats') renderStats();
  }

  // ── Toast ──────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
  }

  // ── Util ───────────────────────────────────────────
  function esc(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Date auto-format ───────────────────────────────
  document.getElementById('fYear').addEventListener('input', function(e) {
    let v = e.target.value.replace(/[^0-9]/g, '');
    if (v.length > 8) v = v.slice(0, 8);
    if (v.length > 4) v = v.slice(0,2) + '/' + v.slice(2,4) + '/' + v.slice(4);
    else if (v.length > 2) v = v.slice(0,2) + '/' + v.slice(2);
    e.target.value = v;
  });

  // ── Export ─────────────────────────────────────────
  function exportData() {
    const json = JSON.stringify(releases, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const d = new Date();
    a.download = `music-tracker-backup-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('Backup downloaded.');
  }

  function importData() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json,application/json';
    input.onchange = e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const parsed = JSON.parse(ev.target.result);
          if (!Array.isArray(parsed)) throw new Error('Invalid format');
          if (!confirm(`Import ${parsed.length} release(s)? This will merge with your existing data.`)) return;
          // Merge: skip duplicates by id
          const existingIds = new Set(releases.map(r => r.id));
          const newEntries = parsed.filter(r => !existingIds.has(r.id));
          releases = [...newEntries, ...releases];
          saveReleases();
          renderList();
          updateHeaderStats();
          showToast(`Imported ${newEntries.length} new release(s).`);
        } catch(err) {
          showToast('Import failed – invalid file.');
        }
      };
      reader.readAsText(file);
    };
    input.click();
  }

  // ── Init ───────────────────────────────────────────
  loadReleases();
</script>
</body>
</html>
